<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semillas Iluro - Semana 12</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gd:#1a5c2a;--gm:#00B050;--gl:#92D050;--tx:#1a1a1a;--tl:#666;--br:#e0e0d8;--rd:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f5f5f0;color:var(--tx);}
.hdr{background:var(--gd);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;gap:12px;flex-wrap:wrap;}
.brand h1{font-family:'Playfair Display',serif;font-size:clamp(1rem,3vw,1.5rem);font-weight:700;}
.badge{display:inline-block;background:var(--gm);color:#fff;font-size:.7rem;font-weight:600;padding:2px 10px;border-radius:20px;margin-top:3px;text-transform:uppercase;letter-spacing:.05em;}
.contact{font-size:.72rem;color:rgba(255,255,255,.75);text-align:right;line-height:1.6;}
.contact a{color:#90EE90;text-decoration:none;}
.cbtn{background:#28a745;color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0;}
.cbtn:hover{background:#1e7e34;}
.cn{background:#fff;color:#28a745;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;}
.clibar{background:rgba(255,255,255,.08);border-top:1px solid rgba(255,255,255,.12);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.clibar label{font-size:.8rem;font-weight:600;color:rgba(255,255,255,.85);white-space:nowrap;}
.clibar input{flex:1;min-width:160px;padding:5px 10px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:rgba(255,255,255,.15);color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;}
.clibar input::placeholder{color:rgba(255,255,255,.45);}
.clibar input:focus{outline:none;border-color:var(--gm);}
.plazo{font-size:.72rem;color:#FFD700;font-weight:500;white-space:nowrap;}
.tabs{background:#fff;border-bottom:2px solid var(--br);display:flex;padding:0 16px;overflow-x:auto;}
.tbtn{background:none;border:none;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:.87rem;font-weight:500;color:var(--tl);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.tbtn.on{color:var(--gd);border-bottom-color:var(--gd);font-weight:600;}
.tbtn:hover{color:var(--gd);}
.sbar{background:#fff;padding:10px 16px;border-bottom:1px solid var(--br);}
.sinp{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--br);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.88rem;background:#f9f9f7;}
.sinp:focus{outline:none;border-color:var(--gm);}
.main{padding:16px;max-width:1400px;margin:0 auto;}
.pnl{display:none;}.pnl.on{display:block;}
.csec{margin-bottom:18px;border-radius:var(--rd);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);background:#fff;}
.chdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.chdr h2{font-family:'Playfair Display',serif;font-size:.93rem;font-weight:700;}
.tog{width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:transform .2s;flex-shrink:0;}
.csec.coll .tog{transform:rotate(-90deg);}
.cbdy{padding:12px 14px;border-top:1px solid rgba(0,0,0,.06);}
.csec.coll .cbdy{display:none;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:8px;}
.pcard{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1.5px solid var(--br);border-radius:8px;background:#fdfdfb;transition:border-color .15s,box-shadow .15s;}
.pcard:hover{border-color:var(--gm);box-shadow:0 2px 8px rgba(0,176,80,.12);}
.pcard.sel{border-color:var(--gm);background:#f0fff5;}
.pinfo{flex:1;min-width:0;}
.pname{font-size:.8rem;font-weight:500;line-height:1.25;}
.pcode{font-size:.7rem;color:var(--tl);font-family:monospace;text-decoration:none;display:inline-block;margin-top:1px;}
.pcode:hover{color:var(--gd);text-decoration:underline;}
.qctl{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.qbtn{width:28px;height:28px;border:1.5px solid var(--br);background:#fff;border-radius:6px;cursor:pointer;font-size:1.1rem;font-weight:600;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .12s;}
.qbtn:hover{background:var(--gl);border-color:var(--gm);color:var(--gd);}
.qinp{width:42px;height:28px;border:1.5px solid var(--br);border-radius:6px;text-align:center;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;color:var(--tx);}
.qinp:focus{outline:none;border-color:var(--gm);}
.qinp::-webkit-inner-spin-button,.qinp::-webkit-outer-spin-button{-webkit-appearance:none;}
.cg{background:#00B050;color:#fff;}.cy{background:#d4cc00;color:#222;}.cr{background:#dd1111;color:#fff;}
.cb{background:#00B0F0;color:#fff;}.co{background:#FFC000;color:#222;}.cx{background:#777;color:#fff;}
.rwrap{background:#fff;border-radius:var(--rd);box-shadow:0 2px 12px rgba(0,0,0,.08);padding:22px;max-width:820px;margin:0 auto;}
.rwrap h2{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gd);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--gm);}
.rempty{text-align:center;color:var(--tl);padding:36px;font-size:.92rem;}
.rtbl{width:100%;border-collapse:collapse;font-size:.85rem;}
.rtbl th{background:var(--gd);color:#fff;padding:7px 10px;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;}
.rtbl td{padding:6px 10px;border-bottom:1px solid var(--br);}
.rtbl tr:hover td{background:#f9f9f7;}
.rgh td{background:#e8f5e9;font-weight:700;font-size:.74rem;text-transform:uppercase;color:var(--gd);padding:5px 10px;}
.cqty{font-weight:700;color:var(--gd);text-align:center;width:55px;}
.ccod{font-family:monospace;font-size:.76rem;color:var(--tl);width:78px;}
.rtot{background:#f0fff5;border:1px solid var(--gm);border-radius:8px;padding:11px 14px;margin-top:12px;display:flex;justify-content:space-between;align-items:center;}
.rtot .tn{font-size:1.2rem;color:var(--gd);font-weight:700;}
.rftr{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;justify-content:flex-end;}
.btn{border:none;border-radius:8px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .2s;}
.btn-g{background:var(--gd);color:#fff;}.btn-g:hover{background:#0f3d18;}
.btn-r{background:#dc3545;color:#fff;}.btn-r:hover{background:#b02a37;}
.btn-w{background:#25D366;color:#fff;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.btn-w:hover{background:#1ebe5d;}
@media(max-width:600px){.contact{display:none;}.main{padding:10px;}.pgrid{grid-template-columns:1fr;}.rftr{justify-content:center;}.tabs{padding:0 4px;}.tbtn{padding:11px 10px;font-size:.8rem;}}
@media print{.hdr,.tabs,.sbar,.rftr{display:none!important;}.pnl{display:block!important;}body{background:#fff;}.rwrap{box-shadow:none;}}
</style>
</head>

<script>

var ORD = {};
var SEM = 0;
var DATA = null;
var META = {};

function init() {
  var el = document.getElementById('appdata');
  DATA = JSON.parse(el.textContent);
  SEM = DATA.semana;
  buildPanel('pack');
  buildPanel('maceta');
  updCN();
}

function colorCls(h) {
  if (!h) return 'cx';
  h = h.toLowerCase();
  if (h === '#00b050' || h === '#92d050') return 'cg';
  if (h === '#ffff00') return 'cy';
  if (h === '#ff0000') return 'cr';
  if (h === '#00b0f0') return 'cb';
  if (h === '#ffc000') return 'co';
  return 'cx';
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function buildPanel(sk) {
  var sheet = DATA[sk];
  var parts = [];
  for (var cat in sheet) {
    var cd = sheet[cat];
    if (!cd.items || !cd.items.length) continue;
    var cl = colorCls(cd.color);
    var rows = [];
    for (var i = 0; i < cd.items.length; i++) {
      var it = cd.items[i];
      var sid = (sk + '_' + it.code).replace(/[^a-zA-Z0-9]/g, '_');
      META[sid] = { sk: sk, code: it.code, name: it.name, cat: cat };
      var key = sk + '|' + it.code;
      var qty = ORD[key] ? ORD[key].qty : 0;
      var cardCls = qty > 0 ? 'pcard sel' : 'pcard';
      var url = 'https://www.semillasiluro.com/semillas/' + it.code.toLowerCase() + '/';
      var card = '<div class="' + cardCls + '" id="C_' + sid + '">'
        + '<div class="pinfo">'
        + '<div class="pname">' + esc(it.name) + '</div>'
        + '<a class="pcode" href="' + url + '" target="_blank">' + esc(it.code) + ' ↗</a>'
        + '</div>'
        + '<div class="qctl">'
        + '<button class="qbtn" data-sid="' + sid + '" data-d="-1" onclick="adj(this)">&#8722;</button>'
        + '<input class="qinp" id="I_' + sid + '" type="number" value="' + qty + '" min="0" data-sid="' + sid + '" onchange="onInp(this)">'
        + '<button class="qbtn" data-sid="' + sid + '" data-d="1" onclick="adj(this)">+</button>'
        + '</div>'
        + '</div>';
      rows.push(card);
    }
    parts.push(
      '<div class="csec">'
      + '<div class="chdr ' + cl + '" onclick="togCat(this.parentElement)">'
      + '<h2>' + esc(cat) + '</h2>'
      + '<span class="tog">&#9660;</span>'
      + '</div>'
      + '<div class="cbdy"><div class="pgrid">' + rows.join('') + '</div></div>'
      + '</div>'
    );
  }
  document.getElementById('pnl-' + sk).innerHTML = parts.join('');
}

function adj(btn) {
  var sid = btn.getAttribute('data-sid');
  var d = parseInt(btn.getAttribute('data-d'));
  var inp = document.getElementById('I_' + sid);
  var v = Math.max(0, (parseInt(inp.value) || 0) + d);
  inp.value = v;
  save(sid, v);
}

function onInp(inp) {
  var sid = inp.getAttribute('data-sid');
  var v = Math.max(0, parseInt(inp.value) || 0);
  inp.value = v;
  save(sid, v);
}

function save(sid, qty) {
  var m = META[sid];
  var key = m.sk + '|' + m.code;
  var card = document.getElementById('C_' + sid);
  if (qty > 0) {
    ORD[key] = { sk: m.sk, code: m.code, name: m.name, cat: m.cat, qty: qty };
    if (card) card.classList.add('sel');
  } else {
    delete ORD[key];
    if (card) card.classList.remove('sel');
  }
  updCN();
}

function updCN() {
  var t = 0;
  for (var k in ORD) t += ORD[k].qty;
  document.getElementById('CN').textContent = t;
}

function togCat(sec) { sec.classList.toggle('coll'); }

function swTab(name, btn) {
  document.querySelectorAll('.tbtn').forEach(function(b) { b.classList.remove('on'); });
  document.querySelectorAll('.pnl').forEach(function(p) { p.classList.remove('on'); });
  btn.classList.add('on');
  document.getElementById('pnl-' + name).classList.add('on');
  document.getElementById('SB').style.display = name === 'resumen' ? 'none' : '';
  if (name === 'resumen') renderRes();
}

function goRes() {
  swTab('resumen', document.getElementById('TB3'));
}

function doSearch(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.csec').forEach(function(sec) {
    var any = false;
    sec.querySelectorAll('.pcard').forEach(function(card) {
      var nm = card.querySelector('.pname').textContent.toLowerCase();
      var cd = card.querySelector('.pcode').textContent.toLowerCase();
      var ok = !q || nm.indexOf(q) >= 0 || cd.indexOf(q) >= 0;
      card.style.display = ok ? '' : 'none';
      if (ok) any = true;
    });
    sec.style.display = any ? '' : 'none';
    if (q && any) sec.classList.remove('coll');
  });
}

function renderRes() {
  var el = document.getElementById('RC');
  var items = [];
  for (var k in ORD) items.push(ORD[k]);
  if (!items.length) {
    el.innerHTML = '<div class="rempty">Aún no has añadido ninguna planta.<br>Ve a los catálogos y pon cantidades.</div>';
    return;
  }
  var grps = {};
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var gk = it.sk + '|' + it.cat;
    if (!grps[gk]) grps[gk] = { lbl: (it.sk === 'pack' ? 'PACK' : 'MACETA') + ' — ' + it.cat, rows: [] };
    grps[gk].rows.push(it);
  }
  var cli = document.getElementById('CLI').value.trim() || '—';
  var tot = items.reduce(function(s, i) { return s + i.qty; }, 0);
  var h = '<p style="font-size:.85rem;margin-bottom:12px"><strong>Cliente:</strong> ' + esc(cli) + ' &nbsp;&middot;&nbsp; <strong>Semana:</strong> ' + SEM + '</p>';
  h += '<table class="rtbl"><thead><tr><th class="ccod">Código</th><th>Nombre</th><th>Formato</th><th>Familia</th><th class="cqty">Cant.</th></tr></thead><tbody>';
  for (var gk in grps) {
    var g = grps[gk];
    h += '<tr class="rgh"><td colspan="5">' + esc(g.lbl) + '</td></tr>';
    for (var i = 0; i < g.rows.length; i++) {
      var it = g.rows[i];
      var url = 'https://www.semillasiluro.com/semillas/' + it.code.toLowerCase() + '/';
      h += '<tr><td class="ccod"><a href="' + url + '" target="_blank" style="color:var(--gd);text-decoration:none">' + esc(it.code) + '</a></td>'
        + '<td>' + esc(it.name) + '</td>'
        + '<td style="font-size:.76rem">' + (it.sk === 'pack' ? 'Pack' : 'Maceta') + '</td>'
        + '<td style="font-size:.76rem">' + esc(it.cat) + '</td>'
        + '<td class="cqty">' + it.qty + '</td></tr>';
    }
  }
  h += '</tbody></table>';
  h += '<div class="rtot"><span>Total plantas en pedido:</span><span class="tn">' + tot + ' ud.</span></div>';
  var msg = '*PEDIDO SEMANA ' + SEM + ' — Semillas Iluro*\nCliente: ' + cli + '\n\n';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    msg += '[' + it.code + '] ' + it.name + ' (' + (it.sk === 'pack' ? 'Pack' : 'Maceta') + ') — ' + it.qty + ' ud.\n';
  }
  msg += '\nTotal: ' + tot + ' plantas';
  h += '<div class="rftr">'
    + '<button class="btn btn-r" onclick="clearAll()">&#128465; Limpiar</button>'
    + '<button class="btn btn-g" onclick="window.print()">&#128424; Imprimir</button>'
    + '<a class="btn btn-w" href="https://wa.me/34610690690?text=' + encodeURIComponent(msg) + '" target="_blank">&#128242; WhatsApp</a>'
    + '</div>';
  el.innerHTML = h;
}

function clearAll() {
  if (!confirm('Limpiar todo el pedido?')) return;
  for (var k in ORD) {
    var parts = k.split('|');
    var sid = (parts[0] + '_' + parts[1]).replace(/[^a-zA-Z0-9]/g, '_');
    var inp = document.getElementById('I_' + sid);
    if (inp) inp.value = 0;
    var card = document.getElementById('C_' + sid);
    if (card) card.classList.remove('sel');
    delete ORD[k];
  }
  updCN();
  renderRes();
}

window.addEventListener('DOMContentLoaded', init);

</script>
</body>
</html>
